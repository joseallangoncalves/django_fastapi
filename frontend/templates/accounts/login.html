{% extends 'base.html' %}

{% block title %}Entrar - Portal de IA{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card" style="max-width: 450px; width: 100%;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 2.5rem; color: hsl(var(--primary)); margin-bottom: 10px;">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin-bottom: 5px;">Portal de IA</h2>
            <p style="color: hsl(var(--text-secondary)); font-size: 0.9rem;">Insira suas credenciais para gerenciar habilidades</p>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Endereço de E-mail</label>
                <input type="email" name="email" id="email" class="form-input" placeholder="exemplo@dominio.com" required value="{{ request.POST.email }}">
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label class="form-label" for="senha">Senha de Acesso</label>
                <input type="password" name="senha" id="senha" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fa-solid fa-right-to-bracket"></i> Acessar Portal
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: hsl(var(--text-secondary));">
            <span>Não possui conta?</span>
            <a href="{% url 'register' %}" style="color: hsl(var(--secondary)); font-weight: 600; margin-left: 5px;">Cadastre-se</a>
        </div>
    </div>
</div>
{% endblock %}
